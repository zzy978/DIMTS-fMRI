model:
  target: Models.interpretable_diffusion.gaussian_diffusion.DiM_TS
  params:
    seq_length: 512
    feature_size: 219
    n_layer_enc: 4
    n_layer_dec: 3
    d_model: 96  # 4 X 24
    timesteps: 500 # 扩散总步数
    sampling_timesteps: 500 # 采样时走多少步，等于 timesteps 就是完整采样，小于它就是快速采样
    loss_type: 'l2' # 时域重建损失，l2 就是 MSE
    beta_schedule: 'cosine'
    n_heads: 4
    mlp_hidden_times: 4 
    attn_pd: 0.0
    resid_pd: 0.0
    kernel_size: 1
    padding_size: 0

    # DiMTS

    # correlation loss weight
    mmd_alpha: 0.0005
    # Fourier loss weight
    l_loss: 0.0
    sample_type: 'batch' #训练时怎么采样扩散步，batch 表示一个 batch 共用同一个 t
    hidden_size: 256
    n_encoder: 1
    n_decoder: 3
    feature_last: True
    input_shape: [512,219]
    mlp_ratio: 4.0
    # latent state dimension of Mamba
    d_state: 1
    d_conv: 3
    model_type: 'DiM'
    # dilated convolutions scale [1, 2, 3]
    conv_num: 2

solver:
  base_lr: 1.0e-4
  max_epochs: 10000
  results_folder: ./Checkpoints_fmri_subjects
  gradient_accumulate_every: 2
  save_cycle: 1000  # 多少步保存一次 checkpoint
  ema:  # EMA 模型参数
    decay: 0.995
    update_interval: 10
  
  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 5000
      min_lr: 1.0e-5
      threshold: 1.0e-1
      threshold_mode: rel
      warmup_lr: 8.0e-4
      warmup: 500 
      verbose: False

dataloader:
  train_dataset:
    target: Utils.Data_utils.real_datasets.CustomDataset
    params:
      name: fmri
      proportion: 0.9  # Set to rate < 1 if training conditional generation
      data_root: /data/home/zyzeng/data1/datasets/hcp_2400time_csv
      window: 512  # seq_length
      save2npy: True
      neg_one_to_one: True
      seed: 123
      period: train

  test_dataset:
    target: Utils.Data_utils.real_datasets.CustomDataset
    params:
      name: fmri
      proportion: 0.9  # rate
      data_root: /data/home/zyzeng/data1/datasets/hcp_2400time_csv/102513.csv
      window: 512  # seq_length
      save2npy: True
      neg_one_to_one: True
      seed: 123
      period: test
      style: separate
      distribution: geometric
    coefficient: 1.0e-2  # 限制样本别偏离扩散模型太远
    step_size: 5.0e-2  # 每次条件修正走多大步
    sampling_steps: 250  # 整个条件采样总共走多少个扩散步

  batch_size: 4 # 训练时的 batch size
  sample_size: 32 # predict/infill时的batch size
  shuffle: True
